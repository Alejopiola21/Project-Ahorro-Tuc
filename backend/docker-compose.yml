services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ahorrotuc_user
      POSTGRES_PASSWORD: ahorrotuc_password
      POSTGRES_DB: ahorrotuc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ahorrotuc.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
