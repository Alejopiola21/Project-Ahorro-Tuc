services:
  postgres:
    image: postgres:15-alpine
    container_name: ahorrotuc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ahorrotuc
      POSTGRES_PASSWORD: ahorrotuc_secret
      POSTGRES_DB: ahorrotuc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahorrotuc -d ahorrotuc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ahorrotuc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ahorrotuc.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-cambiar_en_produccion}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ahorrotuc_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
